name: Build and deploy AgViz

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agviz-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build Vite application
        run: npm run build
        env:
          # For GitHub Pages project sites, Vite needs assets to be rooted at /repo-name/.
          # vite.config.ts should use:
          # base: process.env.BASE_PATH ?? "/"
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload PR build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: agviz-pr-${{ github.event.pull_request.number }}-dist
          path: dist
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v5
